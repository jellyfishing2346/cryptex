<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptex Order Book Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .trading-pair {
            color: #888;
            font-size: 1.2em;
        }

        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .status.connected {
            background: #00c853;
            color: white;
        }

        .status.disconnected {
            background: #ff5252;
            color: white;
        }

        .orderbook {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: #1a1f2e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }

        .bids h2 {
            color: #00c853;
            border-color: #00c853;
        }

        .asks h2 {
            color: #ff5252;
            border-color: #ff5252;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 10px;
            color: #888;
            font-weight: 600;
            font-size: 0.9em;
            border-bottom: 1px solid #333;
        }

        th:first-child {
            text-align: left;
        }

        td {
            text-align: right;
            padding: 12px 10px;
            border-bottom: 1px solid #2a2f3e;
            font-family: 'Courier New', monospace;
        }

        td:first-child {
            text-align: left;
        }

        .bids tr:hover {
            background: rgba(0, 200, 83, 0.1);
        }

        .asks tr:hover {
            background: rgba(255, 82, 82, 0.1);
        }

        .price {
            font-weight: bold;
        }

        .bids .price {
            color: #00c853;
        }

        .asks .price {
            color: #ff5252;
        }

        .spread {
            background: #1a1f2e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .spread h3 {
            color: #888;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .spread-value {
            font-size: 2em;
            color: #00d4ff;
            font-weight: bold;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #1a1f2e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stat-card h3 {
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .stat-card .value {
            font-size: 1.8em;
            color: #00d4ff;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        @media (max-width: 768px) {
            .orderbook {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cryptex Order Book</h1>
            <div>
                <span class="trading-pair" id="tradingPair">BTC-USD</span>
                <span class="status disconnected" id="status">Disconnected</span>
            </div>
        </div>

        <div class="spread">
            <h3>Spread</h3>
            <div class="spread-value" id="spread">$0.00</div>
        </div>

        <div class="orderbook">
            <div class="panel bids">
                <h2>Bids (Buy Orders)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Orders</th>
                        </tr>
                    </thead>
                    <tbody id="bidsBody">
                        <tr>
                            <td colspan="3" class="empty-state">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="panel asks">
                <h2>Asks (Sell Orders)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Orders</th>
                        </tr>
                    </thead>
                    <tbody id="asksBody">
                        <tr>
                            <td colspan="3" class="empty-state">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Bid Volume</h3>
                <div class="value" id="totalBidVolume">0.00</div>
            </div>
            <div class="stat-card">
                <h3>Total Ask Volume</h3>
                <div class="value" id="totalAskVolume">0.00</div>
            </div>
            <div class="stat-card">
                <h3>Best Bid</h3>
                <div class="value" id="bestBid">$0.00</div>
            </div>
            <div class="stat-card">
                <h3>Best Ask</h3>
                <div class="value" id="bestAsk">$0.00</div>
            </div>
        </div>
    </div>

    <script>
        // Use the current window location for WebSocket connection
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
        const ws = new WebSocket(wsUrl);

        const statusEl = document.getElementById('status');
        const bidsBody = document.getElementById('bidsBody');
        const asksBody = document.getElementById('asksBody');
        const spreadEl = document.getElementById('spread');
        const totalBidVolumeEl = document.getElementById('totalBidVolume');
        const totalAskVolumeEl = document.getElementById('totalAskVolume');
        const bestBidEl = document.getElementById('bestBid');
        const bestAskEl = document.getElementById('bestAsk');

        ws.onopen = () => {
            statusEl.textContent = 'Connected';
            statusEl.className = 'status connected';
            console.log('WebSocket connected to', wsUrl);
            // Request initial order book snapshot
            fetchOrderBook();
        };

        ws.onclose = () => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'status disconnected';
            console.log('WebSocket disconnected');
            // Attempt to reconnect after 3 seconds
            setTimeout(() => {
                console.log('Attempting to reconnect...');
                location.reload();
            }, 3000);
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'orderbook') {
                    updateOrderBook(data.payload);
                }
            } catch (error) {
                console.error('Error parsing message:', error);
            }
        };

        function updateOrderBook(snapshot) {
            // Update bids
            bidsBody.innerHTML = '';
            if (snapshot.bids && snapshot.bids.length > 0) {
                let totalVolume = 0;
                snapshot.bids.forEach(bid => {
                    totalVolume += bid.quantity;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="price">$${bid.price.toFixed(2)}</td>
                        <td>${bid.quantity.toFixed(4)}</td>
                        <td>${bid.orders}</td>
                    `;
                    bidsBody.appendChild(row);
                });
                totalBidVolumeEl.textContent = totalVolume.toFixed(4);
                bestBidEl.textContent = `$${snapshot.bids[0].price.toFixed(2)}`;
            } else {
                bidsBody.innerHTML = '<tr><td colspan="3" class="empty-state">No bids</td></tr>';
                totalBidVolumeEl.textContent = '0.00';
                bestBidEl.textContent = '$0.00';
            }

            // Update asks
            asksBody.innerHTML = '';
            if (snapshot.asks && snapshot.asks.length > 0) {
                let totalVolume = 0;
                snapshot.asks.forEach(ask => {
                    totalVolume += ask.quantity;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="price">$${ask.price.toFixed(2)}</td>
                        <td>${ask.quantity.toFixed(4)}</td>
                        <td>${ask.orders}</td>
                    `;
                    asksBody.appendChild(row);
                });
                totalAskVolumeEl.textContent = totalVolume.toFixed(4);
                bestAskEl.textContent = `$${snapshot.asks[0].price.toFixed(2)}`;
            } else {
                asksBody.innerHTML = '<tr><td colspan="3" class="empty-state">No asks</td></tr>';
                totalAskVolumeEl.textContent = '0.00';
                bestAskEl.textContent = '$0.00';
            }

            // Update spread
            if (snapshot.bids.length > 0 && snapshot.asks.length > 0) {
                const spread = snapshot.asks[0].price - snapshot.bids[0].price;
                spreadEl.textContent = `$${spread.toFixed(2)}`;
            } else {
                spreadEl.textContent = '$0.00';
            }
        }

        async function fetchOrderBook() {
            try {
                const response = await fetch('/orderbook?depth=10');
                const data = await response.json();
                updateOrderBook(data);
            } catch (error) {
                console.error('Error fetching order book:', error);
            }
        }
    </script>
</body>
</html>
