---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
# NATS Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        ports:
        - containerPort: 4222
        args: ["-js"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats-service
spec:
  selector:
    app: nats
  ports:
  - port: 4222
    targetPort: 4222
---
# Cryptex Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptex
  labels:
    app: cryptex
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cryptex
  template:
    metadata:
      labels:
        app: cryptex
    spec:
      containers:
      - name: cryptex
        image: cryptex:latest
        ports:
        - containerPort: 8080
        env:
        - name: TRADING_PAIR
          value: "BTC-USD"
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
              optional: true
        - name: REDIS_DB
          value: "0"
        - name: NATS_URL
          value: "nats://nats-service:4222"
        - name: MAX_POSITION_SIZE
          value: "1000.0"
        - name: MIN_PRICE
          value: "0.01"
        - name: MAX_PRICE
          value: "1000000.0"
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cryptex-service
spec:
  selector:
    app: cryptex
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
