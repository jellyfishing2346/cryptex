---
# Development Kubernetes Deployment
# This configuration is optimized for development environments

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cryptex-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        environment: development
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cryptex-dev
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
# NATS Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: cryptex-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        environment: development
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        ports:
        - containerPort: 4222
        - containerPort: 8222
        args: ["-js"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats-service
  namespace: cryptex-dev
spec:
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: 4222
  - name: monitoring
    port: 8222
    targetPort: 8222
---
# Cryptex Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptex
  namespace: cryptex-dev
  labels:
    app: cryptex
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cryptex
  template:
    metadata:
      labels:
        app: cryptex
        environment: development
    spec:
      containers:
      - name: cryptex
        image: cryptex:latest
        imagePullPolicy: Never  # Use local image for development
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: TRADING_PAIR
          value: "BTC-USD"
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: REDIS_DB
          value: "0"
        - name: NATS_URL
          value: "nats://nats-service:4222"
        - name: MAX_POSITION_SIZE
          value: "1000.0"
        - name: MIN_PRICE
          value: "0.01"
        - name: MAX_PRICE
          value: "1000000.0"
        - name: PORT
          value: "8080"
        - name: ENABLE_METRICS
          value: "true"
        - name: METRICS_PORT
          value: "9090"
        - name: GOMAXPROCS
          value: "2"
        - name: GOGC
          value: "100"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cryptex-service
  namespace: cryptex-dev
spec:
  selector:
    app: cryptex
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 9090
  type: NodePort
---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: cryptex-dev
  labels:
    environment: development
